services:
  - type: web
    name: om-portfolio-backend
    runtime: node
    repo: https://github.com/Omganesh014/Terminal-Based-Portfolio
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: GEMINI_API_KEY
        sync: false
      - key: VITE_BASE_PATH
        value: /
